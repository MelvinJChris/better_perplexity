name: Deploy

# Production deploys come only from main. dev is local; staging is not used.
on:
  push:
    branches: [main]
    paths-ignore:
      - '**.md'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_SA_KEY }}

      - uses: google-github-actions/setup-gcloud@v2

      # No --set-env-vars: a redeploy preserves the existing env vars (the
      # GEMINI/TAVILY/EXA keys), so the workflow never needs the secrets.
      # No --allow-unauthenticated: the public IAM binding already persists.
      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy better-perplexity \
            --source . \
            --project better-perplexity \
            --region us-central1 \
            --timeout 120 \
            --concurrency 4 \
            --min-instances 0 \
            --max-instances 5 \
            --quiet
